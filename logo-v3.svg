<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="gold" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B3FA0"/>
      <stop offset="100%" stop-color="#3A1B5C"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7B4FB8"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </radialGradient>
  </defs>

  <!-- Vergina Sun - radiating rays represent concurrent dispatching -->
  <g transform="translate(55,60)">
    <!-- 8 long rays -->
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(0)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(45)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(90)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(135)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(180)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(225)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(270)"/>
    <path d="M -7,-16 L 0,-50 L 7,-16 Z" fill="url(#gold)" transform="rotate(315)"/>

    <!-- 8 short rays (alternating) -->
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(22.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(67.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(112.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(157.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(202.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(247.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(292.5)"/>
    <path d="M -5,-16 L 0,-36 L 5,-16 Z" fill="url(#gold)" opacity="0.6" transform="rotate(337.5)"/>

    <!-- Center circle -->
    <circle r="17" fill="url(#center-glow)"/>
    <circle r="17" fill="none" stroke="#DAA520" stroke-width="1.2" opacity="0.5"/>

    <!-- Inner dot -->
    <circle r="4" fill="#DAA520" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#6B3FA0" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
