name: Build Dory Static Binary

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        default: 'full'
        type: choice
        options:
          - mini
          - ops
          - brain
          - full
  push:
    tags:
      - 'dory-v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-14
          - target: macos-x86_64
            runner: macos-13

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: openswoole, mbstring, curl, openssl, pcntl, sockets, posix
          tools: composer
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader
        working-directory: phalanx

      - name: Build Dory binary
        run: php src/Dory/bin/dory build:binary --profile=${{ inputs.profile || 'full' }} --output=./dory-${{ matrix.target }}
        working-directory: phalanx

      - name: Verify binary
        run: php src/Dory/bin/dory build:doctor ./dory-${{ matrix.target }}
        working-directory: phalanx

      - name: Generate checksums
        run: shasum -a 256 dory-${{ matrix.target }} > dory-${{ matrix.target }}.sha256
        working-directory: phalanx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dory-${{ matrix.target }}
          path: |
            phalanx/dory-${{ matrix.target }}
            phalanx/dory-${{ matrix.target }}.sha256
            phalanx/dory-build.lock.json

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/dory-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dory-*/dory-*
            dory-*/dory-*.sha256
            dory-*/dory-build.lock.json
          generate_release_notes: true
