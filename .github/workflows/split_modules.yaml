name: Split Modules

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Run readiness checks only, or split packages after explicit confirmation."
        required: true
        default: "dry-run"
        type: choice
        options:
          - "dry-run"
          - "split"
      confirmation:
        description: "Required for split: type SPLIT PHALANX PACKAGES"
        required: false
        type: string

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --no-scripts

      - name: Validate release readiness
        run: composer release:check

  split:
    needs: readiness
    if: github.event.inputs.action == 'split'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: 'src/Runtime', split_repository: 'phalanx-runtime' }
          - { local_path: 'src/Console', split_repository: 'phalanx-console' }
          - { local_path: 'src/Network', split_repository: 'phalanx-network' }
          - { local_path: 'src/Agents', split_repository: 'phalanx-agents' }
          - { local_path: 'src/Cli', split_repository: 'phalanx-cli' }
          - { local_path: 'src/Ssh', split_repository: 'phalanx-ssh' }
          - { local_path: 'src/Filesystem', split_repository: 'phalanx-filesystem' }
          - { local_path: 'src/WebSocket', split_repository: 'phalanx-websocket' }
          - { local_path: 'src/Worker', split_repository: 'phalanx-worker' }
          - { local_path: 'src/HttpClient', split_repository: 'phalanx-http-client' }
          - { local_path: 'src/Mark', split_repository: 'phalanx-mark' }
          - { local_path: 'src/PHPStan', split_repository: 'phalanx-phpstan' }
          - { local_path: 'src/AiProviders', split_repository: 'phalanx-ai-providers' }
          - { local_path: 'src/DevServer', split_repository: 'phalanx-dev-server' }
          - { local_path: 'src/Http', split_repository: 'phalanx-http' }
          - { local_path: 'src/Stream', split_repository: 'phalanx-stream' }
          - { local_path: 'src/SurrealDb', split_repository: 'phalanx-surrealdb' }
          - { local_path: 'src/Tui', split_repository: 'phalanx-tui' }
          - { local_path: 'src/Config', split_repository: 'phalanx-config' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require explicit split confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "SPLIT PHALANX PACKAGES" ]; then
            echo "Type SPLIT PHALANX PACKAGES in the confirmation input to create repositories and push splits." >&2
            exit 1
          fi

      - name: Ensure split repositories exist
        if: github.event.inputs.action == 'split'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          REPO_NAME=$(basename ${{ matrix.package.split_repository }})
          REPO_FULL_NAME="phalanx-php/$REPO_NAME"
          CREATE_OUTPUT=$(mktemp)
          trap 'rm -f "$CREATE_OUTPUT"' EXIT

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GH_ACCESS_TOKEN secret is required to create or verify split repositories." >&2
            exit 1
          fi

          set +e
          gh repo create "$REPO_FULL_NAME" --public --description "Read-only split of phalanx-php/phalanx" >"$CREATE_OUTPUT" 2>&1
          CREATE_STATUS=$?
          set -e

          if [ "$CREATE_STATUS" -eq 0 ]; then
            cat "$CREATE_OUTPUT"
          elif grep -Eiq 'already exists|name already exists' "$CREATE_OUTPUT"; then
            echo "Repository $REPO_FULL_NAME already exists."
          else
            cat "$CREATE_OUTPUT" >&2
            exit "$CREATE_STATUS"
          fi

          REPO_INFO=$(gh repo view "$REPO_FULL_NAME" --json nameWithOwner,viewerPermission --jq '.nameWithOwner + " " + .viewerPermission')
          VIEWED_REPO=$(printf '%s\n' "$REPO_INFO" | awk '{print $1}')
          VIEWER_PERMISSION=$(printf '%s\n' "$REPO_INFO" | awk '{print $2}')

          if [ "$VIEWED_REPO" != "$REPO_FULL_NAME" ]; then
            echo "Expected $REPO_FULL_NAME but GitHub returned $VIEWED_REPO." >&2
            exit 1
          fi

          case "$VIEWER_PERMISSION" in
            ADMIN|MAINTAIN|WRITE)
              echo "Verified $VIEWER_PERMISSION permission for $REPO_FULL_NAME."
              ;;
            *)
              echo "GH_ACCESS_TOKEN has $VIEWER_PERMISSION permission for $REPO_FULL_NAME; WRITE, MAINTAIN, or ADMIN is required." >&2
              exit 1
              ;;
          esac

      - name: Split module
        if: github.event.inputs.action == 'split'
        uses: driesvints/monorepo-split-github-action@v2
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'phalanx-php'
          repository_name: ${{ matrix.package.split_repository }}
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          branch: "main"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
