name: Split Modules

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: 'src/Aegis', split_repository: 'phalanx-php/aegis' }
          - { local_path: 'src/Archon', split_repository: 'phalanx-php/archon' }
          - { local_path: 'src/Argos', split_repository: 'phalanx-php/argos' }
          - { local_path: 'src/Athena', split_repository: 'phalanx-php/athena' }
          - { local_path: 'src/Cli', split_repository: 'phalanx-php/cli' }
          - { local_path: 'src/Enigma', split_repository: 'phalanx-php/enigma' }
          - { local_path: 'src/Grammata', split_repository: 'phalanx-php/grammata' }
          - { local_path: 'src/Hermes', split_repository: 'phalanx-php/hermes' }
          - { local_path: 'src/Hydra', split_repository: 'phalanx-php/hydra' }
          - { local_path: 'src/Iris', split_repository: 'phalanx-php/iris' }
          - { local_path: 'src/PHPStan', split_repository: 'phalanx-php/phpstan' }
          - { local_path: 'src/Panoply', split_repository: 'phalanx-php/panoply' }
          - { local_path: 'src/Skopos', split_repository: 'phalanx-php/skopos' }
          - { local_path: 'src/Stoa', split_repository: 'phalanx-php/stoa' }
          - { local_path: 'src/Styx', split_repository: 'phalanx-php/styx' }
          - { local_path: 'src/Surreal', split_repository: 'phalanx-php/surreal' }
          - { local_path: 'src/Theatron', split_repository: 'phalanx-php/theatron' }
          - { local_path: 'src/Themis', split_repository: 'phalanx-php/themis' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure split repositories exist
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          REPO_NAME=$(basename ${{ matrix.package.split_repository }})
          gh repo create "phalanx-php/$REPO_NAME" --public --description "Read-only split of phalanx-php/phalanx" 2>/dev/null || true

      - name: Split module
        uses: driesvints/monorepo-split-github-action@v2
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'phalanx-php'
          repository_name: ${{ matrix.package.split_repository }}
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          branch: "main"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
