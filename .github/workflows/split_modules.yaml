name: Split Modules

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local_path: 'src/Runtime', split_repository: 'phalanx-runtime' }
          - { local_path: 'src/Console', split_repository: 'phalanx-console' }
          - { local_path: 'src/Network', split_repository: 'phalanx-network' }
          - { local_path: 'src/Agent', split_repository: 'phalanx-agent' }
          - { local_path: 'src/Cli', split_repository: 'phalanx-cli' }
          - { local_path: 'src/Ssh', split_repository: 'phalanx-ssh' }
          - { local_path: 'src/Filesystem', split_repository: 'phalanx-filesystem' }
          - { local_path: 'src/WebSocket', split_repository: 'phalanx-websocket' }
          - { local_path: 'src/Worker', split_repository: 'phalanx-worker' }
          - { local_path: 'src/HttpClient', split_repository: 'phalanx-http-client' }
          - { local_path: 'src/Mark', split_repository: 'phalanx-mark' }
          - { local_path: 'src/PHPStan', split_repository: 'phalanx-phpstan' }
          - { local_path: 'src/AiProviders', split_repository: 'phalanx-ai-providers' }
          - { local_path: 'src/DevServer', split_repository: 'phalanx-dev-server' }
          - { local_path: 'src/Http', split_repository: 'phalanx-http' }
          - { local_path: 'src/Stream', split_repository: 'phalanx-stream' }
          - { local_path: 'src/SurrealDb', split_repository: 'phalanx-surrealdb' }
          - { local_path: 'src/Tui', split_repository: 'phalanx-tui' }
          - { local_path: 'src/Config', split_repository: 'phalanx-config' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure split repositories exist
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          REPO_NAME=$(basename ${{ matrix.package.split_repository }})
          if gh repo view "phalanx-php/$REPO_NAME" >/dev/null 2>&1; then
            echo "Repository phalanx-php/$REPO_NAME already exists."
            exit 0
          fi

          gh repo create "phalanx-php/$REPO_NAME" --public --description "Read-only split of phalanx-php/phalanx"

      - name: Split module
        uses: driesvints/monorepo-split-github-action@v2
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'phalanx-php'
          repository_name: ${{ matrix.package.split_repository }}
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          branch: "main"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
