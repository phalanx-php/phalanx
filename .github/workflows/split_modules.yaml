name: Split Modules

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Check module metadata
        run: php tools/check-modules.php

      - name: Split modules
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          SPLIT_REPOSITORY_OWNER: phalanx-php
        run: php tools/split-modules.php
