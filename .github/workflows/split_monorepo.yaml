name: 'Monorepo Split'

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

jobs:
  split_monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - phalanx-aegis
          - phalanx-archon
          - phalanx-stoa
          - phalanx-athena
          - phalanx-hydra
          - phalanx-postgres
          - phalanx-styx
          - phalanx-hermes
          - phalanx-argos
          - phalanx-grammata
          - phalanx-enigma
          - phalanx-theatron
          - phalanx-eidolon
          - phalanx-skopos
          # NOT published yet (maturing):
          # - phalanx-redis
          # - phalanx-twilio
          # NOT published yet (spec-only):
          # - phalanx-cdp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: symplify/monorepo-split-github-action@v2.3.0
        with:
          package_directory: 'packages/${{ matrix.package }}'
          repository_organization: 'phalanx-php'
          repository_name: '${{ matrix.package }}'
          tag: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
