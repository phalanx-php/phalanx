name: 'Monorepo Split'

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

jobs:
  split_monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - phalanx-core
          - phalanx-console
          - phalanx-http
          - phalanx-ai
          - phalanx-parallel
          - phalanx-postgres
          - phalanx-stream
          - phalanx-ws-server
          - phalanx-ws-client
          - phalanx-network
          - phalanx-filesystem
          - phalanx-ssh
          - phalanx-terminal
          - phalanx-ui
          # NOT published yet (maturing):
          # - phalanx-redis
          # - phalanx-twilio
          # NOT published yet (spec-only):
          # - phalanx-cdp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: symplify/monorepo-split-github-action@v2.3.0
        with:
          package_directory: 'packages/${{ matrix.package }}'
          repository_organization: 'havy-tech'
          repository_name: '${{ matrix.package }}'
          tag: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
