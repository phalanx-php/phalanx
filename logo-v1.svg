<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>

  <!-- Fanned formation spears (5, fanning outward from behind shield) -->
  <g opacity="0.7">
    <g transform="rotate(-12, 28, 108)">
      <line x1="28" y1="18" x2="28" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 28 0 C 23.5 5, 24 12, 26 18 L 28 16 L 30 18 C 32 12, 32.5 5, 28 0 Z" fill="url(#bronze)"/>
    </g>

    <g transform="rotate(-6, 41, 108)">
      <line x1="41" y1="14" x2="41" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 41 -4 C 36.5 1, 37 8, 39 14 L 41 12 L 43 14 C 45 8, 45.5 1, 41 -4 Z" fill="url(#bronze)"/>
    </g>

    <line x1="55" y1="10" x2="55" y2="108" stroke="#B89850" stroke-width="2.2"/>
    <path d="M 55 -8 C 50.5 -3, 51 4, 53 10 L 55 8 L 57 10 C 59 4, 59.5 -3, 55 -8 Z" fill="url(#bronze)"/>

    <g transform="rotate(6, 69, 108)">
      <line x1="69" y1="14" x2="69" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 69 -4 C 64.5 1, 65 8, 67 14 L 69 12 L 71 14 C 73 8, 73.5 1, 69 -4 Z" fill="url(#bronze)"/>
    </g>

    <g transform="rotate(12, 82, 108)">
      <line x1="82" y1="18" x2="82" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 82 0 C 77.5 5, 78 12, 80 18 L 82 16 L 84 18 C 86 12, 86.5 5, 82 0 Z" fill="url(#bronze)"/>
    </g>
  </g>

  <!-- Shield body -->
  <path d="M 55 18 L 100 32 L 96 80 Q 55 116 14 80 L 10 32 Z" fill="url(#shield)"/>

  <!-- Inner rim -->
  <path d="M 55 26 L 92 38 L 89 76 Q 55 106 21 76 L 18 38 Z"
        fill="none" stroke="url(#bronze)" stroke-width="1.2" opacity="0.3"/>

  <!-- Shield highlight -->
  <path d="M 55 18 L 100 32 L 98 50 Q 55 58 12 50 L 10 32 Z"
        fill="white" opacity="0.08"/>

  <!-- Lambda -->
  <path d="M 55 35 L 80 94 L 68 94 L 55 56 L 42 94 L 30 94 Z" fill="url(#bronze)"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
