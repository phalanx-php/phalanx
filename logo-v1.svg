<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E2C07C"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Formation spears behind shield (coordination/concurrency) -->
  <g opacity="0.5">
    <line x1="28" y1="14" x2="28" y2="110" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 28 4 L 24.5 14 L 28 12 L 31.5 14 Z" fill="#C9A55A"/>

    <line x1="41" y1="10" x2="41" y2="110" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 41 0 L 37.5 10 L 41 8 L 44.5 10 Z" fill="#C9A55A"/>

    <line x1="55" y1="7" x2="55" y2="110" stroke="#C9A55A" stroke-width="1.8"/>
    <path d="M 55 -3 L 51 7 L 55 5 L 59 7 Z" fill="#C9A55A"/>

    <line x1="69" y1="10" x2="69" y2="110" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 69 0 L 65.5 10 L 69 8 L 72.5 10 Z" fill="#C9A55A"/>

    <line x1="82" y1="14" x2="82" y2="110" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 82 4 L 78.5 14 L 82 12 L 85.5 14 Z" fill="#C9A55A"/>
  </g>

  <!-- Shield body -->
  <path d="M 55 18 L 100 32 L 96 80 Q 55 116 14 80 L 10 32 Z" fill="url(#shield)"/>

  <!-- Inner rim -->
  <path d="M 55 26 L 92 38 L 89 76 Q 55 106 21 76 L 18 38 Z"
        fill="none" stroke="url(#bronze)" stroke-width="1.2" opacity="0.3"/>

  <!-- Shield highlight -->
  <path d="M 55 18 L 100 32 L 98 50 Q 55 58 12 50 L 10 32 Z"
        fill="white" opacity="0.08"/>

  <!-- Lambda -->
  <path d="M 55 35 L 80 94 L 68 94 L 55 56 L 42 94 L 30 94 Z" fill="url(#bronze)"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
