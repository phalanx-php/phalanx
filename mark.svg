<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="body" cx="0.38" cy="0.34" r="0.58">
      <stop offset="0%" stop-color="#B82838"/>
      <stop offset="40%" stop-color="#9E2030"/>
      <stop offset="100%" stop-color="#4E0A14"/>
    </radialGradient>

    <linearGradient id="rim" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5A0E18"/>
      <stop offset="100%" stop-color="#2A0408"/>
    </linearGradient>

    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="40%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>

    <linearGradient id="bronzeLight" x1="0.2" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F5E4A8"/>
      <stop offset="100%" stop-color="#D4B06A"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFDE8" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ECD48E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="depth" cx="0.62" cy="0.66" r="0.55">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="55%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <circle cx="62" cy="62" r="53" fill="black" opacity="0.2"/>

  <!-- Outer rim -->
  <circle cx="60" cy="60" r="53" fill="url(#rim)"/>

  <!-- Shield body -->
  <circle cx="60" cy="60" r="49" fill="url(#body)"/>

  <!-- Bronze outer trim ring -->
  <circle cx="60" cy="60" r="49" fill="none" stroke="url(#bronze)" stroke-width="1.2" opacity="0.4"/>

  <!-- Bronze inner trim ring -->
  <circle cx="60" cy="60" r="41" fill="none" stroke="url(#bronze)" stroke-width="0.7" opacity="0.2"/>

  <!-- Depth shadow overlay -->
  <circle cx="60" cy="60" r="49" fill="url(#depth)"/>

  <!-- Specular highlight -->
  <ellipse cx="46" cy="42" rx="18" ry="12" fill="white" opacity="0.04"
           transform="rotate(-20 46 42)"/>

  <!-- === INSIGNIA === -->

  <!-- Chevron — wide obtuse lambda, leg tips arc along shield rim -->
  <!-- Shadow layer -->
  <path d="M 61,51 L 103,86 A 49 49 0 0 1 97,94 L 61,63 L 25,94 A 49 49 0 0 1 19,86 Z"
        fill="black" opacity="0.2"/>

  <!-- Main chevron -->
  <path d="M 60,50 L 102,85 A 49 49 0 0 1 96,93 L 60,62 L 24,93 A 49 49 0 0 1 18,85 Z"
        fill="url(#bronze)"/>

  <!-- Chevron lit face (left leg) -->
  <path d="M 60,50 L 24,93 A 49 49 0 0 1 18,85 Z"
        fill="url(#bronzeLight)" opacity="0.35"/>

  <!-- Star glow -->
  <circle cx="60" cy="91" r="10" fill="url(#glow)"/>

  <!-- 4-pointed star sparkle -->
  <!-- Vertical ray -->
  <path d="M 60,84 L 61.5,91 L 60,98 L 58.5,91 Z" fill="url(#bronzeLight)" opacity="0.9"/>
  <!-- Horizontal ray -->
  <path d="M 53,91 L 60,89.5 L 67,91 L 60,92.5 Z" fill="url(#bronzeLight)" opacity="0.9"/>

  <!-- Bright center point -->
  <circle cx="60" cy="91" r="1.3" fill="#FFFDE8" opacity="0.8"/>

  <!-- Faint light beam up into inner apex -->
  <path d="M 59.3,84 L 60,62 L 60.7,84 Z" fill="url(#bronzeLight)" opacity="0.1"/>
</svg>
