<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>

  <!-- Mark (scaled to fit left side, centered vertically) -->
  <g transform="translate(15, 0)">
    <!-- Left sweep -->
    <path d="M 52,82 C 32,66 76,30 80,13 C 77,32 38,66 56,80 Z" fill="url(#shield)"/>

    <!-- Right sweep -->
    <path d="M 108,82 C 128,66 84,30 80,13 C 83,32 122,66 104,80 Z" fill="url(#shield)"/>

    <!-- Lambda spearhead Λ -->
    <path d="M 80,12 L 100,108 L 92,108 L 80,40 L 68,108 L 60,108 Z" fill="url(#bronze)"/>

    <!-- Crossguard -->
    <path d="M 70,105 L 90,105 L 90.5,107.5 L 69.5,107.5 Z" fill="url(#shield)"/>

    <!-- Shaft notch -->
    <path d="M 79,102.5 L 81.5,101.5 L 81.5,111 L 79,111 Z" fill="url(#shield)"/>
  </g>

  <!-- Wordmark -->
  <text x="190" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>

  <!-- Tagline -->
  <text x="193" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">SUPERVISED EXECUTION RUNTIME FOR PHP</text>
</svg>
