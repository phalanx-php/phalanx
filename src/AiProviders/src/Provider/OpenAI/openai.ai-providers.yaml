id: openai
display_name: "OpenAI"
base_url: "https://api.openai.com"
models:
  - name: gpt-5
    model_id: gpt-5
    aliases: ["gpt5", "gpt-5-latest"]
    capabilities:
      closed: ["reasoning", "tool-use", "vision", "structured-output"]
      custom: []
    input_pricing: 0.00125
    output_pricing: 0.01
  - name: gpt-5-mini
    model_id: gpt-5-mini
    aliases: ["mini", "gpt-5-mini-latest"]
    capabilities:
      closed: ["reasoning", "tool-use", "vision", "structured-output"]
      custom: []
    input_pricing: 0.00025
    output_pricing: 0.002
  - name: o3
    model_id: o3
    aliases: ["o3-latest"]
    capabilities:
      closed: ["reasoning", "tool-use", "structured-output", "extended-thinking"]
      custom: []
    input_pricing: 0.002
    output_pricing: 0.008
capabilities:
  closed: ["reasoning", "tool-use", "vision", "structured-output", "extended-thinking"]
  custom: []
transport:
  streaming: true
  cancellable: true
  backpressure: true
  partial_json: true
wire_translator: "Phalanx\\AiProviders\\Provider\\OpenAI\\ChatProvider"
