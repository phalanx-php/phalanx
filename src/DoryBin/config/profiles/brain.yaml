name: brain
description: AI runtime (core + AI + Postgres)

php:
  version: "8.4"
  ini:
    memory_limit: "1G"
    max_execution_time: "0"
  ini_path: "${DORY_INI_PATH:-~/.config/dory}"
  ini_scan_dir: "${DORY_INI_SCAN_DIR:-~/.config/dory/conf.d}"

extensions:
  required:
    - swoole
    - openssl
    - curl
    - mbstring
    - pcntl
    - sockets
    - posix
    - filter
    - tokenizer
    - ctype
    - iconv
    - pdo_pgsql
    - pdo_sqlite
  optional: []

swoole:
  version: "26.2.0"
  features:
    openssl: true
    http2: true
    hook_curl: true
    cares: true
    sockets: true
    postgres: true
    mysqlnd: false

phalanx:
  packages:
    - aegis
    - stoa
    - iris
    - styx
    - dory
    - archon
    - themis
    - athena
    - panoply
    - postgres

spc:
  registries:
    - tools/spc-swoole
