name: ops
description: Operations runtime (core + SSH + filesystem + Redis)

php:
  version: "8.4"
  ini:
    openswoole.use_fiber_context: "1"
    memory_limit: "512M"
    max_execution_time: "0"
  ini_path: "${DORY_INI_PATH:-~/.config/dory}"
  ini_scan_dir: "${DORY_INI_SCAN_DIR:-~/.config/dory/conf.d}"

extensions:
  required:
    - openswoole
    - openssl
    - curl
    - mbstring
    - pcntl
    - sockets
    - posix
    - filter
    - tokenizer
    - ctype
    - iconv
    - redis
  optional: []

openswoole:
  version: "26.2.0"
  features:
    openssl: true
    http2: true
    hook_curl: true
    cares: true
    sockets: true
    postgres: false
    mysqlnd: false

phalanx:
  packages:
    - aegis
    - stoa
    - iris
    - styx
    - dory
    - archon
    - themis
    - enigma
    - grammata
    - hydra

spc:
  registries:
    - tools/spc-openswoole
