<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B4C6F"/>
      <stop offset="100%" stop-color="#152A42"/>
    </linearGradient>
    <linearGradient id="silver" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#E0E6EE"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </linearGradient>
  </defs>

  <!-- Owl body -->
  <path d="M 55 12 Q 96 12, 100 36 L 98 78 Q 55 118, 12 78 L 10 36 Q 14 12, 55 12 Z"
        fill="url(#navy)"/>

  <!-- Body highlight -->
  <path d="M 55 12 Q 96 12, 100 36 L 99 52 Q 55 60, 11 52 L 10 36 Q 14 12, 55 12 Z"
        fill="white" opacity="0.06"/>

  <!-- Ear tufts -->
  <path d="M 22 24 L 10 4 L 32 20 Z" fill="url(#navy)"/>
  <path d="M 88 24 L 100 4 L 78 20 Z" fill="url(#navy)"/>

  <!-- Left eye -->
  <circle cx="38" cy="44" r="15" fill="url(#silver)"/>
  <circle cx="38" cy="44" r="7" fill="#152A42"/>
  <circle cx="42" cy="40" r="2.5" fill="white" opacity="0.6"/>

  <!-- Right eye -->
  <circle cx="72" cy="44" r="15" fill="url(#silver)"/>
  <circle cx="72" cy="44" r="7" fill="#152A42"/>
  <circle cx="76" cy="40" r="2.5" fill="white" opacity="0.6"/>

  <!-- Brow ridge -->
  <path d="M 20 32 Q 38 26, 50 34" fill="none" stroke="#1A2A3E" stroke-width="1.5" opacity="0.4"/>
  <path d="M 90 32 Q 72 26, 60 34" fill="none" stroke="#1A2A3E" stroke-width="1.5" opacity="0.4"/>

  <!-- Beak -->
  <path d="M 55 58 L 49 68 L 55 65 L 61 68 Z" fill="#C9A55A"/>

  <!-- Concurrency feather lines -->
  <path d="M 26 78 Q 55 88, 84 78" fill="none" stroke="#5B8CB8" stroke-width="1.2" opacity="0.5"/>
  <path d="M 23 86 Q 55 96, 87 86" fill="none" stroke="#5B8CB8" stroke-width="1.2" opacity="0.4"/>
  <path d="M 21 94 Q 55 104, 89 94" fill="none" stroke="#5B8CB8" stroke-width="1.2" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#2B5C8A" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
