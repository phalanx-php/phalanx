<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110">
  <defs>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze-fill" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E2C07C"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M 50 5 L 96 20 L 92 70 Q 50 108 8 70 L 4 20 Z" fill="url(#shield-fill)"/>

  <!-- Subtle inner rim -->
  <path d="M 50 14 L 88 27 L 85 66 Q 50 99 15 66 L 12 27 Z"
        fill="none" stroke="url(#bronze-fill)" stroke-width="1.2" opacity="0.3"/>

  <!-- Shield highlight -->
  <path d="M 50 5 L 96 20 L 94 40 Q 50 50 6 40 L 4 20 Z"
        fill="white" opacity="0.08"/>

  <!-- Lambda -->
  <path d="M 50 25 L 76 85 L 64 85 L 50 48 L 36 85 L 24 85 Z" fill="url(#bronze-fill)"/>

  <!-- Wordmark -->
  <text x="120" y="58"
        font-family="'SFMono-Regular', 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>

  <!-- Tagline -->
  <text x="123" y="82"
        font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
