<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>

  <!-- Helmet crest / plume (bolder) -->
  <path d="M 35 22 C 40 8, 49 2, 55 1 C 61 2, 70 8, 75 22 C 68 14, 60 10, 55 9 C 50 10, 42 14, 35 22 Z"
        fill="url(#bronze)"/>

  <!-- Shield body -->
  <path d="M 55 18 L 100 32 L 96 80 Q 55 116 14 80 L 10 32 Z" fill="url(#shield)"/>

  <!-- Outer rim -->
  <path d="M 55 26 L 92 38 L 89 76 Q 55 106 21 76 L 18 38 Z"
        fill="none" stroke="url(#bronze)" stroke-width="1.8" opacity="0.5"/>

  <!-- Inner rim -->
  <path d="M 55 33 L 85 43 L 83 72 Q 55 98 27 72 L 25 43 Z"
        fill="none" stroke="url(#bronze)" stroke-width="1" opacity="0.25"/>

  <!-- Shield highlight -->
  <path d="M 55 18 L 100 32 L 98 50 Q 55 58 12 50 L 10 32 Z"
        fill="white" opacity="0.07"/>

  <!-- Lambda -->
  <path d="M 55 38 L 78 92 L 67 92 L 55 58 L 43 92 L 32 92 Z" fill="url(#bronze)"/>

  <!-- Accent line (ties icon to text) -->
  <line x1="10" y1="118" x2="490" y2="118" stroke="url(#bronze)" stroke-width="0.8" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#B91C3A" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
