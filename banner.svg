<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 120">
  <defs>
    <radialGradient id="body" cx="0.38" cy="0.34" r="0.58">
      <stop offset="0%" stop-color="#B82838"/>
      <stop offset="40%" stop-color="#9E2030"/>
      <stop offset="100%" stop-color="#4E0A14"/>
    </radialGradient>

    <linearGradient id="rim" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#5A0E18"/>
      <stop offset="100%" stop-color="#2A0408"/>
    </linearGradient>

    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="40%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>

    <linearGradient id="bronzeLight" x1="0.2" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F5E4A8"/>
      <stop offset="100%" stop-color="#D4B06A"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFDE8" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ECD48E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="depth" cx="0.62" cy="0.66" r="0.55">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="55%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- === SHIELD MARK (scaled to fit 120x120 area, offset to x=0) === -->
  <g transform="translate(5, 0)">
    <circle cx="55" cy="60" r="53" fill="black" opacity="0.15"/>
    <circle cx="53" cy="58" r="53" fill="url(#rim)"/>
    <circle cx="53" cy="58" r="49" fill="url(#body)"/>
    <circle cx="53" cy="58" r="49" fill="none" stroke="url(#bronze)" stroke-width="1.2" opacity="0.4"/>
    <circle cx="53" cy="58" r="41" fill="none" stroke="url(#bronze)" stroke-width="0.7" opacity="0.2"/>
    <circle cx="53" cy="58" r="49" fill="url(#depth)"/>
    <ellipse cx="40" cy="41" rx="16" ry="10" fill="white" opacity="0.04" transform="rotate(-20 40 41)"/>

    <!-- Chevron shadow -->
    <path d="M 54,49 L 96,84 A 49 49 0 0 1 90,92 L 54,61 L 18,92 A 49 49 0 0 1 12,84 Z"
          fill="black" opacity="0.2"/>
    <!-- Chevron -->
    <path d="M 53,48 L 95,83 A 49 49 0 0 1 89,91 L 53,60 L 17,91 A 49 49 0 0 1 11,83 Z"
          fill="url(#bronze)"/>
    <!-- Chevron lit face -->
    <path d="M 53,48 L 17,91 A 49 49 0 0 1 11,83 Z"
          fill="url(#bronzeLight)" opacity="0.35"/>

    <!-- Star glow -->
    <circle cx="53" cy="89" r="10" fill="url(#glow)"/>
    <!-- Vertical ray -->
    <path d="M 53,82 L 54.5,89 L 53,96 L 51.5,89 Z" fill="url(#bronzeLight)" opacity="0.9"/>
    <!-- Horizontal ray -->
    <path d="M 46,89 L 53,87.5 L 60,89 L 53,90.5 Z" fill="url(#bronzeLight)" opacity="0.9"/>
    <!-- Center point -->
    <circle cx="53" cy="89" r="1.3" fill="#FFFDE8" opacity="0.8"/>
    <!-- Light beam -->
    <path d="M 52.3,82 L 53,60 L 53.7,82 Z" fill="url(#bronzeLight)" opacity="0.1"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="128" y="56" font-family="'Georgia', 'Times New Roman', serif"
        font-size="48" font-weight="bold" fill="#B91C3A" letter-spacing="6">PHALANX</text>

  <!-- === TAGLINE === -->
  <text x="131" y="82" font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="13" fill="#808080" letter-spacing="1.8">supervised execution runtime for PHP 8.4+</text>
</svg>
