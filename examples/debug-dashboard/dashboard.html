<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Convoy Debug Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1b26;
    --bg-surface: #24283b;
    --bg-hover: #2f3349;
    --border: #3b4261;
    --text: #c0caf5;
    --text-dim: #565f89;
    --text-bright: #e0e6ff;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --red: #f7768e;
    --yellow: #e0af68;
    --cyan: #7dcfff;
    --magenta: #bb9af7;
    --orange: #ff9e64;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 220px 1fr;
  }

  header {
    grid-column: 1 / -1;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  .status-group {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .status .dot.connected { background: var(--green); }
  .status .dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .metric {
    font-size: 11px;
    color: var(--text-dim);
  }

  .metric .value {
    color: var(--accent);
    font-weight: 600;
  }

  aside {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  aside h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .channel-list {
    list-style: none;
  }

  .channel-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .channel-list li:hover { background: var(--bg-hover); }

  .channel-list input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .channel-list .swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .channel-list label {
    cursor: pointer;
    font-size: 12px;
  }

  .sidebar-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .sidebar-actions button {
    flex: 1;
    padding: 5px 0;
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .sidebar-actions button:hover {
    background: var(--bg-hover);
    color: var(--text);
  }

  .sidebar-actions button.destructive:hover {
    background: #f7768e22;
    color: var(--red);
    border-color: var(--red);
  }

  main {
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  #entries {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }

  .entry {
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    animation: slideIn 0.2s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 11px;
  }

  .entry-id {
    color: var(--text-dim);
  }

  .entry-channel {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .entry-time {
    color: var(--text-dim);
    margin-left: auto;
  }

  .entry-location {
    color: var(--text-dim);
    font-size: 10px;
  }

  .entry-data {
    background: var(--bg);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-bright);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 8px;
  }

  .empty-state code {
    background: var(--bg-surface);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--cyan);
  }

  #metrics-bar {
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 24px;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  #metrics-bar .value { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>CONVOY DEBUG</h1>
  <div class="status">
    <span class="dot" id="dump-dot"></span>
    <span id="dump-status">dumps: disconnected</span>
  </div>
  <div class="status">
    <span class="dot" id="metrics-dot"></span>
    <span id="metrics-status">metrics: disconnected</span>
  </div>
  <div class="status-group">
    <div class="metric">dumps: <span class="value" id="dump-count">0</span></div>
    <div class="metric">connections: <span class="value" id="conn-count">0</span></div>
    <div class="metric">memory: <span class="value" id="mem-usage">--</span></div>
  </div>
</header>

<aside>
  <h2>Channels</h2>
  <div class="sidebar-actions">
    <button id="btn-uncheck-all">Uncheck All</button>
    <button id="btn-clear" class="destructive">Clear</button>
  </div>
  <ul class="channel-list" id="channel-list">
    <li>
      <input type="checkbox" id="ch-all" checked>
      <span class="swatch" style="background: var(--accent)"></span>
      <label for="ch-all">* (all)</label>
    </li>
  </ul>
</aside>

<main>
  <div id="entries">
    <div class="empty-state" id="empty-state">
      <div>Waiting for dumps...</div>
      <code>curl -X POST http://localhost:8080/dump -H 'Content-Type: application/json' -d '{"channel":"app","data":{"hello":"world"}}'</code>
    </div>
  </div>
  <div id="metrics-bar">
    <span>mem: <span class="value" id="bar-mem">--</span></span>
    <span>peak: <span class="value" id="bar-peak">--</span></span>
    <span>dumps: <span class="value" id="bar-dumps">0</span></span>
    <span>conns: <span class="value" id="bar-conns">0</span></span>
  </div>
</main>

<script>
(function() {
  const CHANNEL_COLORS = [
    '#7aa2f7', '#9ece6a', '#f7768e', '#e0af68', '#7dcfff',
    '#bb9af7', '#ff9e64', '#73daca', '#b4f9f8', '#c0caf5'
  ];

  const state = {
    channels: new Map(),
    colorIndex: 0,
    autoScroll: true,
    dumpWs: null,
    metricsWs: null,
    dumpRetry: 1000,
    metricsRetry: 1000,
  };

  const $ = (sel) => document.querySelector(sel);
  const entries = $('#entries');
  const emptyState = $('#empty-state');

  function getChannelColor(name) {
    if (!state.channels.has(name)) {
      state.channels.set(name, {
        color: CHANNEL_COLORS[state.colorIndex % CHANNEL_COLORS.length],
        subscribed: true,
      });
      state.colorIndex++;
      renderChannelList();
    }
    return state.channels.get(name).color;
  }

  function renderChannelList() {
    const list = $('#channel-list');
    const allItem = list.querySelector('li');
    list.innerHTML = '';
    list.appendChild(allItem);

    for (const [name, info] of state.channels) {
      const li = document.createElement('li');
      const id = 'ch-' + name.replace(/[^a-z0-9]/gi, '-');
      li.innerHTML = `
        <input type="checkbox" id="${id}" ${info.subscribed ? 'checked' : ''}>
        <span class="swatch" style="background: ${info.color}"></span>
        <label for="${id}">${name}</label>
      `;
      li.querySelector('input').addEventListener('change', (e) => {
        info.subscribed = e.target.checked;
        sendSubscription(name, info.subscribed);
        filterEntries();
      });
      list.appendChild(li);
    }
  }

  function sendSubscription(channel, subscribe) {
    if (state.dumpWs && state.dumpWs.readyState === WebSocket.OPEN) {
      state.dumpWs.send(JSON.stringify({
        action: subscribe ? 'subscribe' : 'unsubscribe',
        channel: channel,
      }));
    }
  }

  function filterEntries() {
    for (const el of entries.querySelectorAll('.entry')) {
      const ch = el.dataset.channel;
      const info = state.channels.get(ch);
      el.style.display = (!info || info.subscribed) ? '' : 'none';
    }
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function formatTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString('en-US', { hour12: false }) + '.' +
           String(d.getMilliseconds()).padStart(3, '0');
  }

  function formatData(data) {
    if (typeof data === 'string') return data;
    try {
      return JSON.stringify(data, null, 2);
    } catch {
      return String(data);
    }
  }

  function addEntry(entry) {
    if (emptyState) emptyState.remove();

    const color = getChannelColor(entry.channel);
    const info = state.channels.get(entry.channel);
    const hidden = info && !info.subscribed;

    const div = document.createElement('div');
    div.className = 'entry';
    div.dataset.channel = entry.channel;
    if (hidden) div.style.display = 'none';

    let location = '';
    if (entry.file) {
      location = `<span class="entry-location">${entry.file}${entry.line ? ':' + entry.line : ''}</span>`;
    }

    div.innerHTML = `
      <div class="entry-header">
        <span class="entry-id">#${entry.id}</span>
        <span class="entry-channel" style="background: ${color}22; color: ${color}; border: 1px solid ${color}44">${entry.channel}</span>
        ${location}
        <span class="entry-time">${formatTime(entry.timestamp)}</span>
      </div>
      <div class="entry-data">${formatData(entry.data)}</div>
    `;

    entries.appendChild(div);

    if (state.autoScroll) {
      entries.scrollTop = entries.scrollHeight;
    }

    $('#dump-count').textContent = entries.querySelectorAll('.entry').length;
  }

  function setStatus(prefix, dotId, statusId, status) {
    const dot = $(dotId);
    const label = $(statusId);
    dot.className = 'dot ' + status;
    label.textContent = prefix + ': ' + status;
  }

  function connectDumps() {
    const ws = new WebSocket(`ws://${location.host}/dumps`);
    state.dumpWs = ws;

    ws.onopen = () => {
      setStatus('dumps', '#dump-dot', '#dump-status', 'connected');
      state.dumpRetry = 1000;
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'backlog') {
        for (const entry of msg.entries) addEntry(entry);
        return;
      }

      if (msg.type === 'dump') {
        addEntry(msg.entry);
      }
    };

    ws.onclose = () => {
      setStatus('dumps', '#dump-dot', '#dump-status', 'disconnected');
      setTimeout(connectDumps, Math.min(state.dumpRetry, 30000));
      state.dumpRetry = Math.min(state.dumpRetry * 1.5, 30000);
    };

    ws.onerror = () => ws.close();
  }

  function connectMetrics() {
    const ws = new WebSocket(`ws://${location.host}/metrics`);
    state.metricsWs = ws;

    ws.onopen = () => {
      setStatus('metrics', '#metrics-dot', '#metrics-status', 'connected');
      state.metricsRetry = 1000;
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type !== 'metrics') return;

      for (const m of msg.batch) {
        if (m.metric === 'memory') {
          $('#mem-usage').textContent = formatBytes(m.value);
          $('#bar-mem').textContent = formatBytes(m.value);
          $('#bar-peak').textContent = formatBytes(m.peak);
        }
        if (m.metric === 'dumps') {
          $('#bar-dumps').textContent = m.value;
        }
        if (m.metric === 'connections') {
          $('#conn-count').textContent = m.value;
          $('#bar-conns').textContent = m.value;
        }
      }
    };

    ws.onclose = () => {
      setStatus('metrics', '#metrics-dot', '#metrics-status', 'disconnected');
      setTimeout(connectMetrics, Math.min(state.metricsRetry, 30000));
      state.metricsRetry = Math.min(state.metricsRetry * 1.5, 30000);
    };

    ws.onerror = () => ws.close();
  }

  entries.addEventListener('scroll', () => {
    const threshold = 50;
    state.autoScroll = entries.scrollTop + entries.clientHeight >= entries.scrollHeight - threshold;
  });

  $('#btn-uncheck-all').addEventListener('click', () => {
    for (const [name, info] of state.channels) {
      info.subscribed = false;
      sendSubscription(name, false);
    }
    renderChannelList();
    filterEntries();
  });

  $('#btn-clear').addEventListener('click', () => {
    entries.querySelectorAll('.entry').forEach(el => el.remove());
    $('#dump-count').textContent = '0';
    if (!$('#empty-state')) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'empty-state';
      empty.innerHTML = '<div>Cleared. Waiting for dumps...</div>';
      entries.appendChild(empty);
    }
  });

  connectDumps();
  connectMetrics();
})();
</script>
</body>
</html>
