<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C62840"/>
      <stop offset="100%" stop-color="#891428"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left shield ⟨ — smoothed apex -->
  <path d="M 48,10 L 14,57 Q 10,60 14,63 L 48,110 L 38,98 L 22,62 Q 20,60 22,58 L 38,22 Z" fill="url(#shield)"/>
  <path d="M 48,10 L 14,57 Q 10,60 14,63 L 48,110 L 38,98 L 22,62 Q 20,60 22,58 L 38,22 Z" fill="url(#hl)"/>
  <path d="M 41,28 Q 24,60 41,92" fill="none" stroke="url(#bronze)" stroke-width="1" opacity="0.3"/>

  <!-- Right shield ⟩ — smoothed apex -->
  <path d="M 112,10 L 146,57 Q 150,60 146,63 L 112,110 L 122,98 L 138,62 Q 140,60 138,58 L 122,22 Z" fill="url(#shield)"/>
  <path d="M 112,10 L 146,57 Q 150,60 146,63 L 112,110 L 122,98 L 138,62 Q 140,60 138,58 L 122,22 Z" fill="url(#hl)"/>
  <path d="M 119,28 Q 136,60 119,92" fill="none" stroke="url(#bronze)" stroke-width="1" opacity="0.3"/>

  <!-- Lambda spearhead Λ -->
  <path d="M 80,12 L 100,108 L 92,108 L 80,40 L 68,108 L 60,108 Z" fill="url(#bronze)"/>

  <!-- Crossguard — shorter, more gap to spearhead -->
  <path d="M 70,105 L 90,105 L 90.5,107.5 L 69.5,107.5 Z" fill="url(#shield)"/>

  <!-- Shaft notch — longer bottom, angled flat top -->
  <path d="M 79,102.5 L 81.5,101.5 L 81.5,111 L 79,111 Z" fill="url(#shield)"/>
</svg>
