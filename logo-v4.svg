<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="dark-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E2E3E"/>
      <stop offset="100%" stop-color="#1A1A25"/>
    </linearGradient>
    <linearGradient id="amber" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E2C07C"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Formation spears behind shields (6 spears, coordinated wall) -->
  <g opacity="0.5">
    <line x1="28" y1="14" x2="28" y2="105" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 28 4 L 25 14 L 28 12 L 31 14 Z" fill="#C9A55A"/>

    <line x1="40" y1="9" x2="40" y2="105" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 40 -1 L 37 9 L 40 7 L 43 9 Z" fill="#C9A55A"/>

    <line x1="49" y1="5" x2="49" y2="105" stroke="#C9A55A" stroke-width="1.8"/>
    <path d="M 49 -5 L 46 5 L 49 3 L 52 5 Z" fill="#C9A55A"/>

    <line x1="61" y1="5" x2="61" y2="105" stroke="#C9A55A" stroke-width="1.8"/>
    <path d="M 61 -5 L 58 5 L 61 3 L 64 5 Z" fill="#C9A55A"/>

    <line x1="70" y1="9" x2="70" y2="105" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 70 -1 L 67 9 L 70 7 L 73 9 Z" fill="#C9A55A"/>

    <line x1="82" y1="14" x2="82" y2="105" stroke="#C9A55A" stroke-width="1.5"/>
    <path d="M 82 4 L 79 14 L 82 12 L 85 14 Z" fill="#C9A55A"/>
  </g>

  <!-- Three overlapping round shields (Theban black aspis formation) -->
  <!-- Left shield -->
  <circle cx="36" cy="66" r="28" fill="url(#dark-shield)" stroke="#8B7B5A" stroke-width="1.5"/>
  <circle cx="36" cy="66" r="22" fill="none" stroke="#4A4A5E" stroke-width="0.8" opacity="0.25"/>

  <!-- Right shield -->
  <circle cx="74" cy="66" r="28" fill="url(#dark-shield)" stroke="#8B7B5A" stroke-width="1.5"/>
  <circle cx="74" cy="66" r="22" fill="none" stroke="#4A4A5E" stroke-width="0.8" opacity="0.25"/>

  <!-- Center shield (dominant, forward) -->
  <circle cx="55" cy="60" r="30" fill="url(#dark-shield)" stroke="#C9A55A" stroke-width="2"/>
  <circle cx="55" cy="60" r="24" fill="none" stroke="#6A6A78" stroke-width="0.8" opacity="0.3"/>
  <circle cx="55" cy="60" r="12" fill="none" stroke="#6A6A78" stroke-width="0.6" opacity="0.15"/>

  <!-- Coordination glow at shield intersections -->
  <circle cx="44" cy="63" r="7" fill="#C9A55A" opacity="0.08"/>
  <circle cx="66" cy="63" r="7" fill="#C9A55A" opacity="0.08"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#8B6B2F" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
