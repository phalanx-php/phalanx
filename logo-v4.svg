<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="dark-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E2E3E"/>
      <stop offset="100%" stop-color="#1A1A25"/>
    </linearGradient>
    <linearGradient id="amber" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ECD48E"/>
      <stop offset="50%" stop-color="#C9A55A"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>

  <!-- Fanned formation spears (7, wider fan behind triple-shield wall) -->
  <g opacity="0.65">
    <g transform="rotate(-16, 22, 108)">
      <line x1="22" y1="18" x2="22" y2="108" stroke="#B89850" stroke-width="1.8"/>
      <path d="M 22 0 C 17.5 5, 18 12, 20 18 L 22 16 L 24 18 C 26 12, 26.5 5, 22 0 Z" fill="url(#amber)"/>
    </g>

    <g transform="rotate(-10, 35, 108)">
      <line x1="35" y1="14" x2="35" y2="108" stroke="#B89850" stroke-width="1.8"/>
      <path d="M 35 -4 C 30.5 1, 31 8, 33 14 L 35 12 L 37 14 C 39 8, 39.5 1, 35 -4 Z" fill="url(#amber)"/>
    </g>

    <g transform="rotate(-4, 46, 108)">
      <line x1="46" y1="10" x2="46" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 46 -8 C 41.5 -3, 42 4, 44 10 L 46 8 L 48 10 C 50 4, 50.5 -3, 46 -8 Z" fill="url(#amber)"/>
    </g>

    <line x1="55" y1="8" x2="55" y2="108" stroke="#B89850" stroke-width="2.2"/>
    <path d="M 55 -10 C 50.5 -5, 51 2, 53 8 L 55 6 L 57 8 C 59 2, 59.5 -5, 55 -10 Z" fill="url(#amber)"/>

    <g transform="rotate(4, 64, 108)">
      <line x1="64" y1="10" x2="64" y2="108" stroke="#B89850" stroke-width="2"/>
      <path d="M 64 -8 C 59.5 -3, 60 4, 62 10 L 64 8 L 66 10 C 68 4, 68.5 -3, 64 -8 Z" fill="url(#amber)"/>
    </g>

    <g transform="rotate(10, 75, 108)">
      <line x1="75" y1="14" x2="75" y2="108" stroke="#B89850" stroke-width="1.8"/>
      <path d="M 75 -4 C 70.5 1, 71 8, 73 14 L 75 12 L 77 14 C 79 8, 79.5 1, 75 -4 Z" fill="url(#amber)"/>
    </g>

    <g transform="rotate(16, 88, 108)">
      <line x1="88" y1="18" x2="88" y2="108" stroke="#B89850" stroke-width="1.8"/>
      <path d="M 88 0 C 83.5 5, 84 12, 86 18 L 88 16 L 90 18 C 92 12, 92.5 5, 88 0 Z" fill="url(#amber)"/>
    </g>
  </g>

  <!-- Three overlapping round shields (Theban black aspis formation) -->
  <circle cx="36" cy="66" r="28" fill="url(#dark-shield)" stroke="#8B7B5A" stroke-width="1.5"/>
  <circle cx="36" cy="66" r="22" fill="none" stroke="#4A4A5E" stroke-width="0.8" opacity="0.25"/>

  <circle cx="74" cy="66" r="28" fill="url(#dark-shield)" stroke="#8B7B5A" stroke-width="1.5"/>
  <circle cx="74" cy="66" r="22" fill="none" stroke="#4A4A5E" stroke-width="0.8" opacity="0.25"/>

  <circle cx="55" cy="60" r="30" fill="url(#dark-shield)" stroke="#C9A55A" stroke-width="2"/>
  <circle cx="55" cy="60" r="24" fill="none" stroke="#6A6A78" stroke-width="0.8" opacity="0.3"/>
  <circle cx="55" cy="60" r="12" fill="none" stroke="#6A6A78" stroke-width="0.6" opacity="0.15"/>

  <!-- Coordination glow at shield intersections -->
  <circle cx="44" cy="63" r="7" fill="#C9A55A" opacity="0.08"/>
  <circle cx="66" cy="63" r="7" fill="#C9A55A" opacity="0.08"/>

  <!-- Wordmark -->
  <text x="120" y="62" font-family="monospace"
        font-size="46" font-weight="bold" fill="#8B6B2F" letter-spacing="4">PHALANX</text>
  <text x="123" y="86" font-family="sans-serif"
        font-size="12" fill="#808080" letter-spacing="2.5">ASYNC COORDINATION FOR PHP</text>
</svg>
